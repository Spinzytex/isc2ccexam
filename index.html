<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ISC2 CC Ultimate Practice Exam</title>
<style>
:root{
  --ink:#1c2430; --ink-soft:#4b5563; --paper:#f6f5f1; --card:#ffffff;
  --navy:#1c2b4a; --navy-deep:#101a30; --steel:#3d5a80; --line:#d9d6cc;
  --correct-bg:#eaf3ea; --correct-border:#4c8c4a; --correct-ink:#2c5c2a;
  --wrong-bg:#fbecea; --wrong-border:#b2483f; --wrong-ink:#8c352c;
  --gold:#a9752c; --gold-soft:#e4d3ac;
  --flag:#b2483f;
  --mono:"IBM Plex Mono","Courier New",monospace;
  --serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Georgia,serif;
  --sans:"Inter","Segoe UI",-apple-system,sans-serif;
  --shadow: 0 1px 2px rgba(16,26,48,.06), 0 8px 24px rgba(16,26,48,.08);
  color-scheme: light;
}
html[data-theme="dark"]{
  --ink:#e7e4da; --ink-soft:#a9afba; --paper:#0d1119; --card:#161c29;
  --navy:#2a3c63; --navy-deep:#080b12; --steel:#7fa0cf; --line:#2a3040;
  --correct-bg:#122c17; --correct-border:#4c8c4a; --correct-ink:#8fd18a;
  --wrong-bg:#331714; --wrong-border:#c65f52; --wrong-ink:#e39a90;
  --gold:#d6ab6a; --gold-soft:#4a3c20;
  --flag:#e08477;
  --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.5);
  color-scheme: dark;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0; background:var(--paper); color:var(--ink);
  font-family:var(--sans); line-height:1.55;
  transition:background .25s ease, color .25s ease;
  -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none;
  -webkit-touch-callout:none;
}
/* Allow selection only inside fields where the user is genuinely typing */
input, textarea{ -webkit-user-select:text; user-select:text; }
::selection{ background:var(--gold-soft); }
a{ color: var(--steel); }
button{ font-family:inherit; }
.visually-hidden{ position:absolute; width:1px;height:1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; }

/* ---------- Top chrome ---------- */
.topbar{
  position:sticky; top:0; z-index:60;
  background:linear-gradient(180deg,var(--navy-deep),var(--navy));
  border-bottom:3px solid var(--gold);
  color:#f2efe6;
  display:flex; align-items:center; gap:14px;
  padding:10px 18px;
}
.topbar .brand{
  font-family:var(--serif); font-size:16px; font-weight:600; letter-spacing:.01em;
  white-space:nowrap;
}
.topbar .brand small{
  display:block; font-family:var(--mono); font-size:9.5px; letter-spacing:.14em;
  text-transform:uppercase; color:#c9b98a; font-weight:400;
}
.topbar .spacer{ flex:1; }
.topbar .stat{
  font-family:var(--mono); font-size:12.5px; color:#dfe3ee;
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.18);
  padding:5px 10px; border-radius:3px; white-space:nowrap;
}
.topbar .stat.timer{ min-width:78px; text-align:center; }
.topbar .stat.timer.low{ color:#ffb4a8; border-color:#c65f52; }
.iconbtn{
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.22);
  color:#f2efe6; border-radius:3px; padding:6px 10px; cursor:pointer;
  font-size:13px; display:inline-flex; align-items:center; gap:6px;
  transition:background .15s ease;
}
.iconbtn:hover{ background:rgba(255,255,255,.15); }
.iconbtn:focus-visible, button:focus-visible, [tabindex]:focus-visible{
  outline:2px solid var(--gold); outline-offset:2px;
}

/* ---------- Layout ---------- */
#app{ max-width:1180px; margin:0 auto; padding:0 20px 60px; }
.screen{ animation:fade .3s ease; }
@keyframes fade{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }
@media (prefers-reduced-motion: reduce){ .screen{animation:none;} }

/* ---------- Start screen ---------- */
.hero{
  text-align:center; padding:52px 10px 30px; border-bottom:1px solid var(--line);
}
.hero .eyebrow{
  font-family:var(--mono); letter-spacing:.18em; text-transform:uppercase;
  font-size:12px; color:var(--gold); margin-bottom:10px;
}
.hero h1{ font-family:var(--serif); font-weight:600; font-size:2.5rem; margin:0 0 10px; color:var(--ink); }
.hero p.sub{ max-width:620px; margin:0 auto; color:var(--ink-soft); font-size:15.5px; }

.domain-key{
  display:flex; flex-wrap:wrap; justify-content:center; gap:10px;
  max-width:920px; margin:24px auto 0; font-family:var(--mono); font-size:12px;
}
.domain-key span{
  background:var(--card); border:1px solid var(--line); padding:6px 12px;
  border-radius:2px; color:var(--ink-soft); display:flex; align-items:center; gap:6px;
}
.domain-key .swatch{ width:9px; height:9px; border-radius:50%; display:inline-block; }

.setup-grid{
  display:grid; grid-template-columns:1fr 1fr; gap:20px; max-width:920px;
  margin:36px auto 0;
}
@media (max-width:720px){ .setup-grid{ grid-template-columns:1fr; } }
.setup-card{
  background:var(--card); border:1px solid var(--line); border-radius:6px;
  padding:20px 22px; box-shadow:var(--shadow);
}
.setup-card h3{
  font-family:var(--serif); margin:0 0 4px; font-size:17px; color:var(--ink);
}
.setup-card p.desc{ margin:0 0 14px; font-size:13px; color:var(--ink-soft); }
.segmented{
  display:flex; border:1px solid var(--line); border-radius:5px; overflow:hidden;
}
.segmented button{
  flex:1; padding:10px 8px; border:none; background:var(--card); color:var(--ink-soft);
  cursor:pointer; font-size:13.5px; font-weight:600; border-right:1px solid var(--line);
}
.segmented button:last-child{ border-right:none; }
.segmented button.active{ background:var(--navy); color:#f2efe6; }
.mode-note{ margin-top:10px; font-size:12.5px; color:var(--ink-soft); line-height:1.5; }

.toggle-row{
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 0; border-bottom:1px solid var(--line); gap:12px;
}
.toggle-row:last-child{ border-bottom:none; }
.toggle-row .label{ font-size:13.5px; color:var(--ink); }
.toggle-row .label small{ display:block; color:var(--ink-soft); font-size:11.5px; margin-top:2px; }
.switch{
  position:relative; width:42px; height:24px; flex:none;
  background:var(--line); border-radius:12px; cursor:pointer; border:none; padding:0;
}
.switch.on{ background:var(--navy); }
.switch .knob{
  position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%;
  background:#fff; transition:left .18s ease; box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.switch.on .knob{ left:20px; }
.numfield{
  width:64px; padding:6px 8px; border:1px solid var(--line); border-radius:4px;
  background:var(--paper); color:var(--ink); font-family:var(--mono); font-size:13px;
  text-align:center;
}

.start-actions{ max-width:920px; margin:30px auto 0; display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.btn{
  font-family:var(--sans); font-weight:600; font-size:14.5px; padding:13px 26px;
  border-radius:5px; border:1px solid transparent; cursor:pointer;
  transition:transform .1s ease, background .15s ease;
}
.btn:active{ transform:translateY(1px); }
.btn-primary{ background:var(--navy); color:#f2efe6; }
.btn-primary:hover{ background:var(--navy-deep); }
.btn-gold{ background:var(--gold); color:#241a0c; }
.btn-gold:hover{ filter:brightness(1.06); }
.btn-outline{ background:transparent; border-color:var(--line); color:var(--ink); }
.btn-outline:hover{ background:var(--card); }
.btn-danger-outline{ background:transparent; border-color:var(--wrong-border); color:var(--wrong-border); }
.btn-danger-outline:hover{ background:var(--wrong-bg); }
.btn:disabled{ opacity:.45; cursor:not-allowed; }
.resume-banner{
  max-width:920px; margin:18px auto 0; background:var(--gold-soft);
  border:1px solid var(--gold); border-radius:6px; padding:12px 16px; font-size:13.5px;
  color:var(--ink); display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
}

/* ---------- Exam screen ---------- */
.exam-layout{ display:grid; grid-template-columns:1fr 250px; gap:24px; margin-top:22px; align-items:start; }
@media (max-width:880px){ .exam-layout{ grid-template-columns:1fr; } }

.progress-track{ height:6px; background:var(--line); border-radius:3px; overflow:hidden; margin:16px 0 0; }
.progress-fill{ height:100%; background:linear-gradient(90deg,var(--steel),var(--gold)); transition:width .25s ease; }

.q-shell{
  background:var(--card); border:1px solid var(--line); border-radius:8px;
  padding:26px 28px 22px; box-shadow:var(--shadow); margin-top:16px;
}
.q-meta{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.q-domain-tag{
  font-family:var(--mono); font-size:11.5px; letter-spacing:.06em; text-transform:uppercase;
  color:var(--steel); display:flex; align-items:center; gap:7px;
}
.q-domain-tag .swatch{ width:9px; height:9px; border-radius:50%; }
.flag-btn{
  background:transparent; border:1px solid var(--line); color:var(--ink-soft);
  border-radius:4px; padding:6px 12px; font-size:12.5px; cursor:pointer;
  display:inline-flex; align-items:center; gap:6px;
}
.flag-btn.flagged{ background:var(--wrong-bg); border-color:var(--flag); color:var(--flag); font-weight:600; }
.q-stem{ font-size:16.5px; line-height:1.6; color:var(--ink); margin:0 0 20px; }
.q-stem em{ font-style:italic; color:inherit; }

ul.options{ list-style:none; margin:0 0 4px; padding:0; display:flex; flex-direction:column; gap:10px; }
ul.options li{
  border:1px solid var(--line); border-radius:6px; padding:13px 16px;
  display:flex; gap:12px; cursor:pointer; font-size:14.5px; color:var(--ink);
  background:var(--paper); transition:border-color .12s ease, background .12s ease;
}
ul.options li:hover{ border-color:var(--steel); }
ul.options li .tag{
  font-family:var(--mono); font-weight:700; color:var(--steel); flex:none; width:20px;
}
ul.options li.selected{ border-color:var(--navy); background:var(--gold-soft); }
ul.options li.reveal-correct{ background:var(--correct-bg); border-color:var(--correct-border); }
ul.options li.reveal-wrong{ background:var(--wrong-bg); border-color:var(--wrong-border); }
ul.options li.locked{ cursor:default; }
ul.options li:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

.rationale{ margin-top:18px; padding-top:16px; border-top:1px dashed var(--line); animation:fade .25s ease; }
.answer-flag{ font-family:var(--mono); font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:10px; }
.rline{ display:flex; gap:10px; padding:8px 0; font-size:13.5px; line-height:1.55; }
.rline .mark{
  font-family:var(--mono); font-weight:700; flex:none; width:20px; height:20px;
  border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11.5px;
}
.rline.correct .mark{ background:var(--correct-border); color:#fff; }
.rline.wrong .mark{ background:var(--line); color:var(--ink-soft); }
.rline.correct span:last-child{ color:var(--correct-ink); }
.rline.wrong span:last-child{ color:var(--ink-soft); }

.q-nav{ display:flex; justify-content:space-between; align-items:center; margin-top:22px; gap:10px; flex-wrap:wrap; }
.q-nav .right-group{ display:flex; gap:10px; flex-wrap:wrap; }

/* ---------- Palette ---------- */
.palette-card{
  background:var(--card); border:1px solid var(--line); border-radius:8px;
  padding:16px 16px 18px; box-shadow:var(--shadow); position:sticky; top:70px;
}
.palette-card h4{ margin:0 0 10px; font-family:var(--serif); font-size:14px; color:var(--ink); }
.palette-grid{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
.palette-dot{
  aspect-ratio:1; border-radius:4px; border:1px solid var(--line); background:var(--paper);
  font-family:var(--mono); font-size:11px; color:var(--ink-soft); cursor:pointer;
  display:flex; align-items:center; justify-content:center; position:relative;
}
.palette-dot.current{ box-shadow:0 0 0 2px var(--navy); }
.palette-dot.answered{ background:var(--steel); color:#fff; border-color:var(--steel); }
.palette-dot.correct{ background:var(--correct-border); color:#fff; border-color:var(--correct-border); }
.palette-dot.wrong{ background:var(--wrong-border); color:#fff; border-color:var(--wrong-border); }
.palette-dot.flagged::after{
  content:""; position:absolute; top:-3px; right:-3px; width:8px; height:8px;
  background:var(--flag); border-radius:50%; border:1px solid var(--card);
}
.palette-legend{ margin-top:14px; display:flex; flex-direction:column; gap:6px; font-size:11.5px; color:var(--ink-soft); }
.palette-legend .row{ display:flex; align-items:center; gap:7px; }
.palette-legend .sw{ width:11px; height:11px; border-radius:3px; flex:none; }

.domain-mini{ margin-top:16px; display:flex; flex-direction:column; gap:5px; }
.domain-mini .row{ display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--ink-soft); }
.domain-mini .sw{ width:9px; height:9px; border-radius:50%; flex:none; }

/* ---------- Report ---------- */
.report-hero{ text-align:center; padding:38px 10px 10px; }
.score-ring-wrap{ display:flex; justify-content:center; margin:16px 0 6px; }
.report-hero h2{ font-family:var(--serif); font-size:1.7rem; margin:14px 0 4px; }
.report-hero p{ color:var(--ink-soft); font-size:14px; margin:0; }
.report-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; max-width:920px; margin:30px auto 0; }
@media (max-width:760px){ .report-grid{ grid-template-columns:1fr; } }
.report-card{ background:var(--card); border:1px solid var(--line); border-radius:8px; padding:22px; box-shadow:var(--shadow); }
.report-card h3{ font-family:var(--serif); margin:0 0 14px; font-size:16px; }
.bar-row{ margin-bottom:12px; }
.bar-row .bar-label{ display:flex; justify-content:space-between; font-size:12.5px; color:var(--ink-soft); margin-bottom:4px; }
.bar-track{ height:10px; background:var(--line); border-radius:5px; overflow:hidden; }
.bar-fill{ height:100%; border-radius:5px; }
.stat-list{ display:flex; flex-direction:column; gap:10px; }
.stat-list .row{ display:flex; justify-content:space-between; font-size:13.5px; color:var(--ink); padding:8px 0; border-bottom:1px solid var(--line); }
.stat-list .row:last-child{ border-bottom:none; }
.stat-list .row .v{ font-family:var(--mono); font-weight:600; }

.filter-chips{ display:flex; gap:8px; justify-content:center; margin:28px 0 0; flex-wrap:wrap; }
.chip{
  border:1px solid var(--line); background:var(--card); color:var(--ink-soft);
  padding:7px 16px; border-radius:20px; font-size:12.5px; cursor:pointer;
}
.chip.active{ background:var(--navy); color:#f2efe6; border-color:var(--navy); }

.report-actions{ display:flex; gap:12px; justify-content:center; margin:26px 0 40px; flex-wrap:wrap; }

/* ---------- Review list ---------- */
.review-list{ margin-top:20px; display:flex; flex-direction:column; gap:16px; }
.review-item{ background:var(--card); border:1px solid var(--line); border-radius:8px; padding:20px 22px; }
.review-item .rev-head{ display:flex; justify-content:space-between; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.pill{ font-family:var(--mono); font-size:11px; padding:3px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.04em; }
.pill.ok{ background:var(--correct-bg); color:var(--correct-ink); border:1px solid var(--correct-border); }
.pill.bad{ background:var(--wrong-bg); color:var(--wrong-ink); border:1px solid var(--wrong-border); }
.pill.flag{ background:var(--wrong-bg); color:var(--flag); border:1px solid var(--flag); }
.empty-state{ text-align:center; padding:60px 20px; color:var(--ink-soft); font-size:14px; }

/* ---------- Toast ---------- */
.toast{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
  background:var(--navy-deep); color:#f2efe6; padding:11px 20px; border-radius:6px;
  font-size:13px; box-shadow:var(--shadow); z-index:200; border:1px solid var(--gold);
  opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }

/* ---------- Kbd hint ---------- */
.kbd-hint{ text-align:center; margin-top:26px; font-size:11.5px; color:var(--ink-soft); font-family:var(--mono); }
kbd{ background:var(--card); border:1px solid var(--line); border-bottom-width:2px; padding:1px 6px; border-radius:3px; font-size:11px; }

/* ---------- Print (blocked; see script guard) ---------- */
@media print{
  body::before{
    content:"Printing is disabled for this practice exam.";
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:22px; font-family:sans-serif; color:#000; background:#fff; z-index:99999;
  }
  #app, .topbar, .toast{ display:none !important; }
}
</style>
</head>

uties."}], "correct": "D", "rationale": [{"letter": "A", "text": "Job rotation.", "correct": false}, {"letter": "B", "text": "Mandatory vacation.", "correct": false}, {"letter": "C", "text": "Least privilege.", "correct": false}, {"letter": "D", "text": "Separation of duties requires that critical tasks be divided among multiple people to prevent fraud or error by any single individual. This differs from least privilege (minimizing individual access), job rotation, and mandatory vacation, which serve related but distinct fraud-detection purposes.", "correct": true}]}, {"domain": 3, "stem": "An organization requires employees in sensitive financial roles to take at least five consecutive days of leave each year, during which their duties are performed by another employee. Which security purpose does this policy PRIMARILY serve?", "options": [{"letter": "A", "text": "To eliminate the need for separation of duties entirely across the finance team."}, {"letter": "B", "text": "To reduce employee burnout only, with no meaningful security benefit at all."}, {"letter": "C", "text": "To comply with minimum wage labor laws in the jurisdiction."}, {"letter": "D", "text": "To increase the likelihood that ongoing fraud will be discovered while the employee is away."}], "correct": "D", "rationale": [{"letter": "A", "text": "To eliminate the need for separation of duties entirely across the finance team.", "correct": false}, {"letter": "B", "text": "To reduce employee burnout only, with no meaningful security benefit at all.", "correct": false}, {"letter": "C", "text": "To comply with minimum wage labor laws in the jurisdiction.", "correct": false}, {"letter": "D", "text": "To increase the likelihood that ongoing fraud will be discovered while the employee is away.", "correct": true}]}, {"domain": 3, "stem": "A user authenticates to a corporate application using a password (something they know) and a one-time code generated by an app on their smartphone (something they have). Whic g., allowing an unpatched legacy system to remain in production) be formally documented, reviewed, and approved by an appropriate level of management, along with a plan for eventual remediation. Which concept does this process BEST represent?", "options": [{"letter": "A", "text": "Zero Trust enforcement applied to the production environment."}, {"letter": "B", "text": "Risk acceptance through formal exception management."}, {"letter": "C", "text": "Mandatory access control governing who may approve the exception."}, {"letter": "D", "text": "Risk avoidance, by removing the deviation from production entirely."}], "correct": "B", "rationale": [{"letter": "A", "text": "Zero Trust enforcement applied to the production environment.", "correct": false}, {"letter": "B", "text": "Risk acceptance through formal exception management.", "correct": true}, {"letter": "C", "text": "Mandatory access control governing who may approve the exception.", "correct": false}, {"letter": "D", "text": "Risk avoidance, by removing the deviation from production entirely.", "correct": false}]}, {"domain": 1, "stem": "A company's code of conduct requires all employees to act honestly, avoid conflicts of interest, and report any suspected unethical behavior, reinforcing that security is as much about people and behavior as it is about technology. Which concept does this BEST reflect?", "options": [{"letter": "A", "text": "Defense in depth achieved through layered technical controls."}, {"letter": "B", "text": "Availability of systems supporting day-to-day business operations."}, {"letter": "C", "text": "Non-repudiation of actions taken by individual employees within the organization."}, {"letter": "D", "text": "The role of ethics as a foundational element of an effective security program."}], "correct": "D", "rationale": [{"letter": "A", "text": "Defense in depth achieved through layered technical controls.", "correct": false}, {"letter": "B", "text": "Availability of systems supporting day-to-day business operations.", "correct": false}, {"letter": "C", "text": "Non-repudiation of actions taken by individual employees within the organization.", "correct": false}, {"letter": "D", "text": "The role of ethics as a foundational element of an effective security program.", "correct": true}]}, {"domain": 1, "stem": "An organization discovers that an employee, motivated by financial hardship, sold confidential customer data to a competitor over several months before being detected through unusual data access patterns. Which category of threat actor is BEST represented in this scenario?", "options": [{"letter": "A", "text": "Malicious insider."}, {"letter": "B", "text": "Nation-state actor."}, {"letter": "C", "text": "External hacktivist."}, {"letter": "D", "text": "Script kiddie."}], "correct": "A", "rationale": [{"letter": "A", "text": "Malicious insider.", "correct": true}, {"letter": "B", "text": "Nation-state actor.", "correct": false}, {"letter": "C", "text": "External hacktivist.", "correct": false}, {"letter": "D", "text": "Script kiddie.", "correct": false}]}, {"domain": 1, "stem": "A new employee accidentally misconfigures a cloud storage bucket, unintentionally making sensitive files publicly accessible for several hours before the error is discovered and corrected. Which category of threat source is BEST represented by the employee's action?", "options": [{"letter": "A", "text": "Non-malicious (accidental) insider threat."}, {"letter": "B", "text": "External attacker, exploiting the misconfiguration from outside the organization."}, {"letter": "C", "text": "Malicious insider, deliberately exposing the files for personal gain."}, {"letter": "D", "text": "Advanced persistent threat (APT), maintaining long-term covert access."}], "correct": "A", "rationale": [{"letter": "A", "text": "Non-malicious (accidental) insider threat.", "correct": true}, {"letter": "B", "text": "External attacker, exploiting the misconfiguration from outside the organization.", "co <script>
(function(){
"use strict";

/* ---------------- Data ---------------- */
var RAW = JSON.parse(document.getElementById('qdata').textContent);
var DOMAINS = RAW.domains; // [{num,name,blurb}]
var QUESTIONS = RAW.questions.map(function(q, i){ return Object.assign({ id: i }, q); });
var STORAGE_KEY = 'iscc_ultimate_v2';
var DOMAIN_COLORS = { 1:'#3d5a80', 2:'#a9752c', 3:'#4c8c4a', 4:'#8a5fb0', 5:'#b2483f' };

function domainName(num){ var d = DOMAINS.find(function(d){return d.num===num;}); return d ? d.name : ''; }
function domainColor(num){ return DOMAIN_COLORS[num] || '#888'; }

/* ---------------- State ---------------- */
var state = null;

function freshState(settings){
  var order = QUESTIONS.map(function(q){ return q.id; });
  if (settings.shuffleQuestions) shuffle(order);

  var runtime = {}; // id -> {opts:[{orig,text,rationale,isCorrect}], displayLetters}
  QUESTIONS.forEach(function(q){
    var opts = q.options.map(function(o){
      var rat = q.rationale.find(function(r){ return r.letter === o.letter; });
      return { orig:o.letter, text:o.text, rationale: rat ? rat.text : '', isCorrect: o.letter === q.correct };
    });
    if (settings.shuffleAnswers) shuffle(opts);
    runtime[q.id] = opts;
  });

  return {
    settings: settings,
    order: order,
    runtime: runtime,
    current: 0,
    answers: {},        // qid -> orig letter chosen
    flagged: {},         // qid -> true
    submitted: settings.mode === 'study' ? false : false,
    finished: false,
    elapsed: 0,
    startedAt: Date.now(),
    paused: false,
    reviewFilter: 'all'
  };
}

function shuffle(arr){
  for (var i = arr.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i+1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
}

function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e){ /* ignore quota errors */ }
}
function loadSaved(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e){ return null; }
}
function clearSaved(){ try{ localStorage.removeItem(STORAGE_KEY); }catch(e){} }

/* ---------------- Theme ---------------- */
function initTheme(){
  var saved = null;
  try{ saved = localStorage.getItem('iscc_theme'); } catch(e){}
  var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
}
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme');
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try{ localStorage.setItem('iscc_theme', next); } catch(e){}
  renderTopbar();
}

/* ---------------- Toast ---------------- */
var toastTimer = null;
function toast(msg){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2200);
}

/* ---------------- Timer ---------------- */
var timerInterval = null;
function startTimerLoop(){
  stopTimerLoop();
  timerInterval = setInterval(function(){
    if (!state || state.finished || state.paused) return;
    state.elapsed += 1;
    if (state.settings.timerOn && state.settings.timeLimit > 0){
      var remaining = state.settings.timeLimit - state.elapsed;
      if (remaining <= 0){
        state.elapsed = state.settings.timeLimit;
        submitExam(true);
        return;
      }
    }
    updateTimerDisplay();
    if (state.elapsed % 5 === 0) save();
  }, 1000);
}
function stopTimerLoop(){ if (timerInterval) clearInterval(timerInterval); timerInterval = null; }

function fmtTime(sec){
  sec = Math.max(0, Math.round(sec));
  var h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  function pad(n){ return n<10?('0'+n):(''+n); }
  return h>0 ? (h+':'+pad(m)+':'+pad(s)) : (pad(m)+':'+pad(s));
}
function updateTimerDisplay(){
  var el = document.getElementById('timerStat');
  if (!el) return;
  if (!state.settings.timerOn){ el.textContent = fmtTime(state.elapsed) + ' elapsed'; el.classList.remove('low'); return; }
  var remaining = state.settings.timeLimit - state.elapsed;
  el.textContent = fmtTime(remaining) + ' left';
  el.classList.toggle('low', remaining <= 300);
}

/* ---------------- Scoring ---------------- */
function isAnswered(qid){ return state.answers.hasOwnProperty(qid); }
function isCorrectAnswer(qid){
  if (!isAnswered(qid)) return false;
  var chosen = state.answers[qid];
  var opts = state.runtime[qid];
  var o = opts.find(function(o){ return o.orig === chosen; });
  return o ? o.isCorrect : false;
}
function scoreSummary(){
  var total = QUESTIONS.length, answered = 0, correct = 0;
  var byDomain = {};
  DOMAINS.forEach(function(d){ byDomain[d.num] = { total:0, correct:0, answered:0 }; });
  QUESTIONS.forEach(function(q){
    byDomain[q.domain].total++;
    if (isAnswered(q.id)){
      answered++;
      byDomain[q.domain].answered++;
      if (isCorrectAnswer(q.id)){ correct++; byDomain[q.domain].correct++; }
    }
  });
  return { total:total, answered:answered, correct:correct, byDomain:byDomain };
}

/* ---------------- Navigation helpers ---------------- */
function currentQ(){ return QUESTIONS[state.order[state.current]]; }
function goTo(idx){
  if (idx < 0 || idx >= state.order.length) return;
  state.current = idx;
  save();
  render();
  var card = document.querySelector('.q-shell');
  if (card) card.scrollIntoView({behavior:'smooth', block:'start'});
}
function next(){ goTo(state.current + 1); }
function prev(){ goTo(state.current - 1); }

function selectOption(qid, orig){
  if (state.finished) return;
  if (state.settings.mode === 'exam' && state.submitted) return;
  if (state.settings.mode === 'study' && isAnswered(qid)) return; // locked after first pick in study mode
  state.answers[qid] = orig;
  save();
  render();
}
function toggleFlag(qid){
  if (state.flagged[qid]) delete state.flagged[qid];
  else state.flagged[qid] = true;
  save();
  render();
}

function submitExam(auto){
  state.submitted = true;
  state.finished = true;
  state.paused = true;
  save();
  stopTimerLoop();
  toast(auto ? 'Time is up — exam submitted automatically.' : 'Exam submitted.');
  goToReport();
}

var VIEW = 'start'; // start | exam | report | review
function goToReport(){ VIEW = 'report'; render(); }
function goToReview(filter){ VIEW = 'review'; state.reviewFilter = filter || 'all'; save(); render(); }
function goToExam(idx){ VIEW = 'exam'; if (typeof idx === 'number') state.current = idx; render(); }

/* ---------------- Rendering ---------------- */
var app = document.getElementById('app');

function el(html){
  var t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstChild;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function renderTopbar(){
  var bar = document.getElementById('topbar');
  var theme = document.documentElement.getAttribute('data-theme');
  var themeLabel = theme === 'dark' ? '☾ Dark' : '☀ Light';

  if (!state || VIEW === 'start'){
    bar.innerHTML =
      '<div class="brand"><small>ISC2 &middot; CC</small>Ultimate Practice Exam</div>'+
      '<div class="spacer"></div>'+
      '<button class="iconbtn" id="btnTheme">'+themeLabel+'</button>';
    document.getElementById('btnTheme').onclick = toggleTheme;
    return;
  }

  var summary = scoreSummary();
  var pct = summary.answered ? Math.round(summary.correct/summary.answered*100) : 0;

  bar.innerHTML =
    '<div class="brand"><small>ISC2 &middot; CC</small>Ultimate Practice Exam</div>'+
    '<div class="spacer"></div>'+
    (VIEW==='exam' ? '<span class="stat">Q '+(state.current+1)+' / '+state.order.length+'</span>' : '')+
    (VIEW==='exam' ? '<span class="stat">Answered '+summary.answered+' / '+summary.total+'</span>' : '')+
    (VIEW==='exam' && state.settings.mode==='study' ? '<span class="stat">Score '+summary.correct+'/'+summary.answered+' ('+pct+'%)</span>' : '')+
    (VIEW==='exam' ? '<span class="stat timer" id="timerStat"></span>' : '')+
    (VIEW==='exam' && state.settings.mode==='exam' && !state.submitted ? '<button class="iconbtn" id="btnPause">'+(state.paused?'▶ Resume':'⏸ Pause')+'</button>' : '')+
    '<button class="iconbtn" id="btnTheme">'+themeLabel+'</button>'+
    (VIEW!=='start' ? '<button class="iconbtn" id="btnExit">Exit</button>' : '');

  var bt = document.getElementById('btnTheme'); if (bt) bt.onclick = toggleTheme;
  var bp = document.getElementById('btnPause');
  if (bp) bp.onclick = function(){ state.paused = !state.paused; save(); renderTopbar(); };
  var be = document.getElementById('btnExit');
  if (be) be.onclick = function(){
    if (confirm('Return to setup screen? Your progress is saved and you can resume later.')){
      VIEW = 'start'; render();
    }
  };
  if (VIEW === 'exam') updateTimerDisplay();
}

function render(){
  renderTopbar();
  if (VIEW === 'start') renderStart();
  else if (VIEW === 'exam') renderExam();
  else if (VIEW === 'report') renderReport();
  else if (VIEW === 'review') renderReview();
}

/* ---------- START ---------- */

      '<div class="domain-key">'+domainChips+'</div>'+
    '</div>'+

    (hasSaved ? (
      '<div class="resume-banner"><span>You have a session in progress &mdash; '+Object.keys(saved.answers||{}).length+' of '+QUESTIONS.length+' answered.</span>'+

    ) : '') +

      '<div class="setup-card">'+
        '<h3>Mode</h3>'+
        '<p class="desc">Choose how feedback is delivered.</p>'+
        '<div class="segmented" id="modeSeg">'+
          '<button data-v="study" class="active">Study Mode</button>'+
          '<button data-v="exam">Exam Mode</button>'+
        '</div>'+
        '<div class="mode-note" id="modeNote"></div>'+
      '</div>'+
      '<div class="setup-card">'+
        '<h3>Exam Options</h3>'+
        '<div class="toggle-row"><div class="label">Randomize question order<small>Shuffle the 100 questions each attempt</small></div><button class="switch" id="swQ"><span class="knob"></span></button></div>'+
        '<div class="toggle-row"><div class="label">Randomize answer order<small>Shuffle A&ndash;D within each question</small></div><button class="switch" id="swA"><span class="knob"></span></button></div>'+
        '<div class="toggle-row" id="timerRow"><div class="label">Timer<small>Countdown; auto-submits at zero (Exam Mode only)</small></div><button class="switch" id="swT"><span class="knob"></span></button></div>'+
        '<div class="toggle-row" id="timeLimitRow" style="display:none;"><div class="label">Time limit (minutes)</div><input type="number" class="numfield" id="timeLimitInput" value="120" min="5" max="300"/></div>'+
      '</div>'+
    '</div>'+

    '<div class="start-actions">'+
      '<button class="btn btn-primary" id="btnBegin">Begin Exam</button>'+
    '</div>'+
    '<p class="kbd-hint">Shortcuts once started &middot; <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &middot; <kbd>1</kbd>-<kbd>4</kbd> select &middot; <kbd>F</kbd> flag &middot; <kbd>Enter</kbd> next</p>'+
  '</section>';

  var uiSettings = { mode:'study', shuffleQuestions:false, shuffleAnswers:false, timerOn:false, timeLimit:120*60 };

  function updateModeNote(){
    document.getElementById('modeNote').innerHTML = uiSettings.mode === 'study'
      ? 'See the correct answer and full rationale immediately after each question. Great for learning.'
      : 'Rationale is hidden until you submit the full exam &mdash; closer to real test conditions.';
    document.getElementById('timerRow').style.display = uiSettings.mode === 'exam' ? 'flex' : 'none';
    document.getElementById('timeLimitRow').style.display = (uiSettings.mode === 'exam' && uiSettings.timerOn) ? 'flex' : 'none';
  }
  updateModeNote();

  document.querySelectorAll('#modeSeg button').forEach(function(b){
    b.onclick = function(){
      document.querySelectorAll('#modeSeg button').forEach(function(x){ x.classList.remove('active'); });
      b.classList.add('active');
      uiSettings.mode = b.getAttribute('data-v');
      updateModeNote();

  function wireSwitch(id, key){
    var b = document.getElementById(id);
    b.onclick = function(){
      uiSettings[key] = !uiSettings[key];
      b.classList.toggle('on', uiSettings[key]);
      updateModeNote();
    };
  }
  wireSwitch('swQ','shuffleQuestions');
  wireSwitch('swA','shuffleAnswers');
  wireSwitch('swT','timerOn');

  document.getElementById('btnBegin').onclick = function(){
    uiSettings.timeLimit = Math.max(5, parseInt(document.getElementById('timeLimitInput').value || '120', 10)) * 60;

}

/* ---------- EXAM ---------- */
function renderExam(){
  var q = currentQ();
  var opts = state.runtime[q.id];
  var chosen = state.answers[q.id];
  var showFeedback = (state.settings.mode === 'study' && isAnswered(q.id)) || (state.settings.mode === 'exam' && state.submitted);
  var locked = (state.settings.mode === 'study' && isAnswered(q.id)) || (state.settings.mode === 'exam' && state.submitted);

  var progressPct = Math.round(((state.current+1)/state.order.length)*100);

  var optionsHtml = opts.map(function(o, i){
    var letter = String.fromCharCode(65+i);
    var cls = 'option-li';
    if (chosen === o.orig) cls += ' selected';
    if (showFeedback){
      if (o.isCorrect) cls += ' reveal-correct';
      else if (chosen === o.orig && !o.isCorrect) cls += ' reveal-wrong';
    }
    if (locked) cls += ' locked';
    return '<li class="'+cls+'" data-orig="'+o.orig+'" tabindex="0" role="button" aria-pressed="'+(chosen===o.orig)+'">'+
      '<span class="tag">'+letter+'.</span><span>'+o.text+'</span></li>';
  }).join('');

  var rationaleHtml = '';
  if (showFeedback){
    rationaleHtml = '<div class="rationale"><div class="answer-flag">'+(isCorrectAnswer(q.id) ? 'Correct' : (isAnswered(q.id) ? 'Not quite' : 'Correct answer'))+'</div>'+
      opts.map(function(o){
        return '<div class="rline '+(o.isCorrect?'correct':'wrong')+'"><span class="mark">'+(o.isCorrect?'\u2713':'\u2717')+'</span><span>'+o.text+' &mdash; '+o.rationale+'</span></div>';
      }).join('') + '</div>';
  }

  var paletteHtml = renderPaletteGrid();
  var isLast = state.current === state.order.length - 1;

  app.innerHTML =
  '<section class="screen">'+
    '<div class="progress-track"><div class="progress-fill" style="width:'+progressPct+'%"></div></div>'+
    '<div class="exam-layout">'+
      '<div>'+
        '<div class="q-shell">'+
          '<div class="q-meta">'+
            '<span class="q-domain-tag"><span class="swatch" style="background:'+domainColor(q.domain)+'"></span>Domain '+q.domain+' &middot; '+escapeHtml(domainName(q.domain))+'</span>'+
            '<button class="flag-btn '+(state.flagged[q.id]?'flagged':'')+'" id="btnFlag">'+(state.flagged[q.id]?'\u2691 Flagged':'\u2690 Flag for review')+'</button>'+
          '</div>'+
          '<p class="q-stem">'+q.stem+'</p>'+
          '<ul class="options'+(locked?'':' clickable')+'">'+optionsHtml+'</ul>'+
          rationaleHtml+
          '<div class="q-nav">'+
            '<button class="btn btn-outline" id="btnPrev" '+(state.current===0?'disabled':'')+'>&larr; Previous</button>'+
            '<div class="right-group">'+
              (state.settings.mode==='exam' && !state.submitted ? '<button class="btn btn-gold" id="btnSubmit">Submit Exam</button>' : '')+
              (isLast ? '<button class="btn btn-primary" id="btnFinish">Finish &amp; View Report</button>' : '<button class="btn btn-primary" id="btnNext">Next &rarr;</button>')+
            '</div>'+
          '</div>'+
        '</div>'+
        '<p class="kbd-hint">'+
          '<kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &middot; <kbd>1</kbd>-<kbd>4</kbd> select &middot; <kbd>F</kbd> flag &middot; <kbd>Enter</kbd> next'+
        '</p>'+
      '</div>'+
      '<div class="palette-card no-print">'+
        '<h4>Question Navigator</h4>'+
        '<div class="palette-grid">'+paletteHtml+'</div>'+
        '<div class="palette-legend">'+
          '<div class="row"><span class="sw" style="background:var(--paper);border:1px solid var(--line);"></span>Unanswered</div>'+
          '<div class="row"><span class="sw" style="background:var(--steel);"></span>'+(state.settings.mode==='exam'&&!state.submitted?'Answered':'Answered')+'</div>'+
          (state.settings.mode==='study'||state.submitted ? '<div class="row"><span class="sw" style="background:var(--correct-border);"></span>Correct</div><div class="row"><span class="sw" style="background:var(--wrong-border);"></span>Incorrect</div>' : '')+
          '<div class="row"><span class="sw" style="background:var(--flag);border-radius:50%;width:8px;height:8px;"></span>Flagged</div>'+
        '</div>'+
        '<div class="domain-mini">'+DOMAINS.map(function(d){
          return '<div class="row"><span class="sw" style="background:'+domainColor(d.num)+'"></span>D'+d.num+' &middot; '+escapeHtml(d.name)+'</div>';
        }).join('')+'</div>'+
      '</div>'+
    '</div>'+
  '</section>';

  // wire events
  document.querySelectorAll('ul.options li').forEach(function(li){
    li.addEventListener('click', function(){
      if (locked) return;
      selectOption(q.id, li.getAttribute('data-orig'));
    });
    li.addEventListener('keydown', function(ev){
      if ((ev.key === 'Enter' || ev.key === ' ') && !locked){ ev.preventDefault(); selectOption(q.id, li.getAttribute('data-orig')); }
    });
  });
  document.getElementById('btnFlag').onclick = function(){ toggleFlag(q.id); };
  var bp = document.getElementById('btnPrev'); if (bp) bp.onclick = prev;
  var bn = document.getElementById('btnNext'); if (bn) bn.onclick = next;
  var bf = document.getElementById('btnFinish'); if (bf) bf.onclick = function(){
    if (state.settings.mode === 'exam' && !state.submitted){
      if (confirm('Submit the exam now and view your report?')) submitExam(false);
    } else {
      state.finished = true; save(); goToReport();
    }
  };
  var bs = document.getElementById('btnSubmit'); if (bs) bs.onclick = function(){
    var summary = scoreSummary();
    var remaining = summary.total - summary.answered;
    var msg = remaining > 0 ? ('You still have '+remaining+' unanswered question(s). Submit anyway?') : 'Submit the exam now?';
    if (confirm(msg)) submitExam(false);
  };
  document.querySelectorAll('.palette-dot').forEach(function(d){
    d.onclick = function(){ goTo(parseInt(d.getAttribute('data-idx'),10)); };
  });

  updateTimerDisplay();
}

function renderPaletteGrid(){
  return state.order.map(function(qid, idx){
    var q = QUESTIONS[qid];
    var cls = 'palette-dot';
    if (idx === state.current) cls += ' current';
    var showCorrectness = (state.settings.mode === 'study') || state.submitted;
    if (isAnswered(qid)){
      if (showCorrectness) cls += isCorrectAnswer(qid) ? ' correct' : ' wrong';
      else cls += ' answered';
    }
    if (state.flagged[qid]) cls += ' flagged';
    return '<button class="'+cls+'" data-idx="'+idx+'" title="Domain '+q.domain+'" style="border-top:3px solid '+domainColor(q.domain)+';">'+(idx+1)+'</button>';
  }).join('');
}

/* ---------- REPORT ---------- */

      '<div class="bar-track"><div class="bar-fill" style="width:'+p+'%; background:'+domainColor(d.num)+';"></div></div></div>';

  app.innerHTML =

      '<div class="report-card"><h3>Summary</h3><div class="stat-list">'+
        '<div class="row"><span>Answered</span><span class="v">'+summary.answered+' / '+summary.total+'</span></div>'+
        '<div class="row"><span>Correct</span><span class="v">'+summary.correct+'</span></div>'+
        '<div class="row"><span>Incorrect</span><span class="v">'+(summary.answered-summary.correct)+'</span></div>'+
        '<div class="row"><span>Unanswered</span><span class="v">'+(summary.total-summary.answered)+'</span></div>'+
        '<div class="row"><span>Flagged for review</span><span class="v">'+flaggedCount+'</span></div>'+
        '<div class="row"><span>Time elapsed</span><span class="v">'+timeStr+'</span></div>'+
      '</div></div>'+
    '</div>'+
    '<div class="filter-chips no-print">'+
      '<button class="chip" id="chipAll">Review All</button>'+
      '<button class="chip" id="chipWrong">Review Incorrect</button>'+

    '</div>'+
    '<div class="report-actions no-print">'+
      '<button class="btn btn-outline" id="btnRetake">Retake (New Shuffle)</button>'+
      '<button class="btn btn-danger-outline" id="btnReset">Reset &amp; Return to Setup</button>'+
    '</div>'+
  '</section>';

  document.getElementById('chipAll').onclick = function(){ goToReview('all'); };
  document.getElementById('chipWrong').onclick = function(){ goToReview('wrong'); };
  document.getElementById('chipFlag').onclick = function(){ goToReview('flag'); };
  document.getElementById('btnRetake').onclick = function(){
    var s = state.settings;
    state = freshState(s);
    save();
    VIEW = 'exam';
    render();
    startTimerLoop();
  };
  document.getElementById('btnReset').onclick = function(){
    if (confirm('This clears your saved progress. Continue?')){
      clearSaved();
      state = null;
      VIEW = 'start';

}

/* ---------- REVIEW ---------- */
function renderReview(){
  var filter = state.reviewFilter || 'all';
  var items = state.order.map(function(qid, idx){ return {qid:qid, idx:idx}; }).filter(function(o){
    if (filter === 'wrong') return isAnswered(o.qid) && !isCorrectAnswer(o.qid);
    if (filter === 'flag') return !!state.flagged[o.qid];
    return true;
  });

  var chips =
    '<button class="chip '+(filter==='all'?'active':'')+'" id="chipAll">All ('+state.order.length+')</button>'+
    '<button class="chip '+(filter==='wrong'?'active':'')+'" id="chipWrong">Incorrect</button>'+
    '<button class="chip '+(filter==='flag'?'active':'')+'" id="chipFlag">Flagged</button>';

  var listHtml = items.length ? items.map(function(o){
    var q = QUESTIONS[o.qid];
    var opts = state.runtime[o.qid];
    var chosen = state.answers[o.qid];
    var correct = isCorrectAnswer(o.qid);
    var answered = isAnswered(o.qid);
    var pill = !answered ? '<span class="pill">Unanswered</span>' : (correct ? '<span class="pill ok">Correct</span>' : '<span class="pill bad">Incorrect</span>');
    var flagPill = state.flagged[o.qid] ? '<span class="pill flag">Flagged</span>' : '';
    var optsHtml = opts.map(function(op, i){
      var letter = String.fromCharCode(65+i);
      var cls = op.isCorrect ? 'reveal-correct' : (chosen===op.orig ? 'reveal-wrong' : '');
      return '<li class="'+cls+'"><span class="tag">'+letter+'.</span><span>'+op.text+'</span></li>';
    }).join('');
    var rationaleHtml = '<div class="rationale">'+opts.map(function(op){
      return '<div class="rline '+(op.isCorrect?'correct':'wrong')+'"><span class="mark">'+(op.isCorrect?'\u2713':'\u2717')+'</span><span>'+op.text+' &mdash; '+op.rationale+'</span></div>';
    }).join('')+'</div>';

    return '<div class="review-item">'+
      '<div class="rev-head"><span class="q-domain-tag"><span class="swatch" style="background:'+domainColor(q.domain)+'"></span>Q'+(o.idx+1)+' &middot; Domain '+q.domain+'</span>'+
      '<span>'+pill+' '+flagPill+'</span></div>'+
      '<p class="q-stem">'+q.stem+'</p>'+
      '<ul class="options">'+optsHtml+'</ul>'+
      rationaleHtml+
      '<div class="q-nav"><button class="btn btn-outline btnJump" data-idx="'+o.idx+'">Open in exam view &rarr;</button></div>'+
    '</div>';
  }).join('') : '<div class="empty-state">Nothing to show for this filter yet.</div>';

  app.innerHTML =
  '<section class="screen">'+
    '<div class="filter-chips no-print" style="margin-top:24px;">'+chips+'</div>'+
    '<div class="review-list">'+listHtml+'</div>'+
    '<div class="report-actions no-print"><button class="btn btn-outline" id="btnBackReport">&larr; Back to Report</button></div>'+
  '</section>';

  document.getElementById('chipAll').onclick = function(){ goToReview('all'); };
  document.getElementById('chipWrong').onclick = function(){ goToReview('wrong'); };
  document.getElementById('chipFlag').onclick = function(){ goToReview('flag'); };
  document.getElementById('btnBackReport').onclick = function(){ VIEW='report'; render(); };
  document.querySelectorAll('.btnJump').forEach(function(b){
    b.onclick = function(){ goToExam(parseInt(b.getAttribute('data-idx'),10)); };
  });
}

/* ---------------- Keyboard shortcuts ---------------- */
document.addEventListener('keydown', function(ev){
  if (!state || VIEW !== 'exam') return;
  var tag = (ev.target && ev.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  var q = currentQ();
  if (ev.key === 'ArrowRight'){ next(); }
  else if (ev.key === 'ArrowLeft'){ prev(); }
  else if (ev.key === 'f' || ev.key === 'F'){ toggleFlag(q.id); }
  else if (['1','2','3','4'].indexOf(ev.key) !== -1){
    var opts = state.runtime[q.id];
    var i = parseInt(ev.key,10)-1;
    if (opts[i]) selectOption(q.id, opts[i].orig);
  } else if (ev.key === 'Enter'){
    if (state.current === state.order.length-1){
      if (state.settings.mode==='exam' && !state.submitted){ if (confirm('Submit the exam now and view your report?')) submitExam(false); }
      else { state.finished = true; save(); goToReport(); }
    } else next();
  }
});

/* ---------------- Copy / selection protection ----------------
   Best-effort deterrents against casually highlighting question
   text and pasting it into another app. None of this stops someone
   determined to view page source or use browser dev tools — that
   protection does not exist client-side — but it blocks the
   ordinary "select text -> copy -> paste into a chatbot" path. */
(function(){
  var warned = false;
  function warn(){
    toast('Copying is disabled on this practice exam.');
  }
  document.addEventListener('copy', function(ev){ ev.preventDefault(); warn(); });
  document.addEventListener('cut', function(ev){ ev.preventDefault(); warn(); });
  document.addEventListener('contextmenu', function(ev){ ev.preventDefault(); warn(); });
  document.addEventListener('dragstart', function(ev){ ev.preventDefault(); });
  document.addEventListener('selectstart', function(ev){
    var tag = (ev.target && ev.target.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    ev.preventDefault();
  });
  document.addEventListener('keydown', function(ev){
    var k = ev.key ? ev.key.toLowerCase() : '';
    var ctrlOrCmd = ev.ctrlKey || ev.metaKey;
    if (ctrlOrCmd && (k === 'c' || k === 'x' || k === 'a' || k === 's' || k === 'p' || k === 'u')){
      ev.preventDefault();
      warn();
    }
    if (ev.key === 'F12'){ ev.preventDefault(); }
    if (ctrlOrCmd && ev.shiftKey && (k === 'i' || k === 'j' || k === 'c')){ ev.preventDefault(); }
  });
})();

/* ---------------- Boot ---------------- */
initTheme();
VIEW = 'start';
render();

})();

</script>
